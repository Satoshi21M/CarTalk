services:
  - type: web
    name: cartalk-relay
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_LIVE_MODEL
        value: gemini-3.1-flash-live-preview
      - key: GEMINI_ANALYZE_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_ANALYSIS_FALLBACK_MODEL
        value: gemini-2.5-flash-lite
      - key: LIVE_RELAY_PORT
        value: "8787"
